<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <style>
      .brand-text { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-weight: 900; fill: #1B365D; }
      .sub-text { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-weight: 700; fill: #1B365D; }
      .radar { fill: none; stroke: #AEDE00; stroke-width: 14; stroke-linecap: butt; }
    </style>
  </defs>
  <!-- Radar Waves -->
  <g class="radar">
    <path d="M 40 15 Q 0 60 40 105" />
    <path d="M 65 32 Q 35 60 65 88" />
    <path d="M 90 48 Q 75 60 90 72" />
  </g>
  <!-- Main Brand Text -->
  <text x="110" y="82" class="brand-text" font-size="80" letter-spacing="-2">CARSYSTEM</text>
  <!-- Sub Brand Text aligned to the right -->
  <text x="490" y="112" class="sub-text" font-size="28" letter-spacing="3" text-anchor="end">FROTAS</text>
</svg>
